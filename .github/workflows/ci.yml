name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

      - name: Unit + Conformance tests
        run: go test ./... -v -count=1 -race

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # E2E tests run inside a clean Docker container via testcontainers-go.
      # Auth via CLAUDE_CODE_OAUTH_TOKEN env var.
      - name: E2E tests (in container)
        env:
          CLAUDE_E2E: "1"
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: go test -v -count=1 -run TestE2E_Container -timeout 10m
